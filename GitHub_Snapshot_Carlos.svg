<svg width="780" height="220" viewBox="0 0 780 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1F3A"/>
      <stop offset="100%" stop-color="#132D52"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#F4E19C"/>
    </linearGradient>
  </defs>

  <rect width="780" height="220" rx="14" fill="url(#bg2)"/>
  <rect x="1" y="1" width="778" height="218" rx="13" fill="none" stroke="#2A4A73" stroke-width="1"/>

  <!-- Titulo -->
  <text x="30" y="42" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">
    📊 GitHub Snapshot
  </text>
  <rect x="30" y="52" width="60" height="3" fill="url(#gold2)" rx="1.5"/>

  <!-- Estado disponibilidad -->
  <circle cx="700" cy="35" r="5" fill="#3FB950"/>
  <text x="712" y="39" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#B8C6DA" text-anchor="end">Disponible</text>

  <!-- Columna izquierda: numeros clave -->
  <g font-family="'Segoe UI', Arial, sans-serif">
    <text x="30" y="100" font-size="34" font-weight="700" fill="url(#gold2)">9</text>
    <text x="30" y="122" font-size="12" fill="#B8C6DA">Repositorios públicos</text>

    <text x="150" y="100" font-size="34" font-weight="700" fill="url(#gold2)">4+</text>
    <text x="150" y="122" font-size="12" fill="#B8C6DA">Lenguajes activos</text>

    <text x="260" y="100" font-size="34" font-weight="700" fill="url(#gold2)">2026</text>
    <text x="260" y="122" font-size="12" fill="#B8C6DA">Grado Tecnólogo ADS</text>
  </g>

  <line x1="30" y1="145" x2="750" y2="145" stroke="#2A4A73" stroke-width="1"/>

  <!-- Foco tecnico -->
  <text x="30" y="172" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="#FFFFFF">
    Foco técnico actual
  </text>
  <g font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#B8C6DA">
    <rect x="30" y="182" width="150" height="22" rx="11" fill="#1B365D" stroke="#D4AF37" stroke-width="1"/>
    <text x="105" y="197" text-anchor="middle" fill="#F4E19C">Python</text>

    <rect x="190" y="182" width="170" height="22" rx="11" fill="#1B365D" stroke="#D4AF37" stroke-width="1"/>
    <text x="275" y="197" text-anchor="middle" fill="#F4E19C">SQL Server</text>

    <rect x="370" y="182" width="180" height="22" rx="11" fill="#1B365D" stroke="#D4AF37" stroke-width="1"/>
    <text x="460" y="197" text-anchor="middle" fill="#F4E19C">Automatización de Datos</text>

    <rect x="560" y="182" width="180" height="22" rx="11" fill="#1B365D" stroke="#D4AF37" stroke-width="1"/>
    <text x="650" y="197" text-anchor="middle" fill="#F4E19C">React / JavaScript</text>
  </g>
</svg>
